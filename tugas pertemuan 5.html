<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glad2Glow | Linktree</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: #ac8baa;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 24px 12px 60px;
    }

    .linktree-card {
      background: #efc2ed;
      border-radius: 24px;
      width: 100%;
      max-width: 480px;
      padding: 24px 20px 36px;
      box-shadow: 0 8px 40px rgba(180, 80, 160, 0.12);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid rgba(160, 120, 190, 0.35);
      background: rgba(255, 255, 255, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .profile-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 26px;
    }

    .avatar-wrapper {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #c8b8f0 0%, #e0c8ec 50%, #f0d8cc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-text {
      font-size: 11px;
      font-weight: 600;
      color: #8a72aa;
    }

    .profile-name {
      font-size: 19px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.3px;
    }

    .link-list {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .link-item {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(210, 180, 230, 0.45);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 10px 14px;
      text-decoration: none;
      color: #6b6b6b;
      transition: background 0.15s, transform 0.1s;
    }

    .link-item:hover {
      background: rgba(255, 255, 255, 0.96);
      transform: translateY(-1px);
      text-decoration: none;
      color: #6b6b6b;
    }

    .link-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #fff;
    }

    .link-icon img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 8px;
    }

    .link-label {
      flex: 1;
      text-align: center;
      font-size: 14.5px;
      font-weight: 400;
      color: #6b6b6b;
      letter-spacing: 0.1px;
    }

    .link-dots {
      width: 44px;
      font-size: 17px;
      color: #ccc;
      cursor: pointer;
      line-height: 1;
      text-align: right;
      flex-shrink: 0;
    }

    .join-btn-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 36px;
    }

    .join-btn {
      background: #f2f2f2;
      border: 1.5px solid #d8d8d8;
      border-radius: 999px;
      padding: 11px 26px;
      font-size: 13.5px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .join-btn:hover {
      background: #e8e8e8;
      text-decoration: none;
      color: #333;
    }

    /* ✅ Footer text: hitam sesuai permintaan */
    .footer-links {
      margin-top: 18px;
      text-align: center;
      font-size: 11.5px;
      color: #111111;
    }

    .footer-links a {
      color: #111111;
      text-decoration: none;
      margin: 0 4px;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
